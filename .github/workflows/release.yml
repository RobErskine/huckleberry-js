name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.x.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # No NODE_AUTH_TOKEN needed: auth comes from the OIDC trust configured on npm
      # (Settings → Trusted Publisher). id-token: write above enables the exchange.
      - run: npm publish --provenance --access public
